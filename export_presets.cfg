; MPBT Client — Godot 4 export presets
;
; To export, install export templates via:
;   Godot editor → Editor → Manage Export Templates → Download (or install from .tpz)
; Then run:
;   godot --headless --export-release "Windows Desktop" builds/windows/mpbt-client.exe
;   godot --headless --export-release "Linux/X11"       builds/linux/mpbt-client.x86_64
;   godot --headless --export-release "macOS"           "builds/macos/MPBT Client.zip"
;   godot --headless --export-release "Android"         builds/android/mpbt-client.apk
;   godot --headless --export-release "iOS"             builds/ios/mpbt-client.ipa
;
; Android requires Android SDK + JDK; iOS requires macOS + Xcode.
; IMPORTANT: config/local.json is excluded from all builds to prevent leaking
; developer server overrides into distributed artifacts.

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="config/local.json"
export_path="builds/windows/mpbt-client.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

binary_format/architecture="x86_64"
binary_format/embed_pck=true
texture_format/bptc=true
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=false
custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
application/icon=""
